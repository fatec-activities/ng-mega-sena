<form [formGroup]="megaSenaForm" (ngSubmit)="checkResult()" class="wrapper">
  <div class="card">
    <h2>Mega-Sena Checker</h2>

    <div class="field">
      <label for="officialNumbers">Official result (6 numbers)</label>
      <input id="officialNumbers" type="text" formControlName="officialNumbers" placeholder="1,2,3,4,5,6" required>
    </div>

    <div class="field">
      <label for="playerNumbers">Your numbers (6 to 10 numbers)</label>
      <input id="playerNumbers" type="text" formControlName="playerNumbers" placeholder="3,7,12,25,40,55" required>
    </div>

    <button type="submit">Check Prize</button>

    <div class="result">{{response}}</div>
  </div>
</form>
